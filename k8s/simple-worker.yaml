apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-worker
  namespace: labs
spec:
  selector:
    matchLabels:
      app: simple-worker
  template:
    metadata:
      labels:
        app: simple-worker
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: simple-worker
          image: leoff00/simple-worker:latest
          imagePullPolicy: Always
          env:
            - name: RABBITMQ_URL
              value: amqp://lab:lab@rabbitmq:5672/
            - name: EXCHANGE_NAME
              value: lab.events
            - name: QUEUE_NAME
              value: simple-worker
            - name: BINDING_KEY
              value: labs.worker
          resources:
            limits:
              memory: "128Mi"
              cpu: "500m"
            requests:
              memory: "64Mi"
              cpu: "250m"
          ports:
            - name: http
              containerPort: 8082
          readinessProbe:
            httpGet:
              port: 8082
              path: /readyz
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              port: 8082
              path: /livez
            initialDelaySeconds: 10
            periodSeconds: 15
          startupProbe:
            httpGet:
              port: 8082
              path: /livez
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "echo stopping... && sleep 5"]
---
apiVersion: v1
kind: Service
metadata:
  name: simple-worker-svc
  namespace: labs
spec:
  selector:
    app: simple-worker
  ports:
    - name: worker-http
      port: 8082
      targetPort: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-headless
  namespace: labs
spec:
  clusterIP: None
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: labs
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: labs
spec:
  serviceName: rabbitmq-headless
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management
          imagePullPolicy: IfNotPresent
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: lab
            - name: RABBITMQ_DEFAULT_PASS
              value: lab
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "100m"
          ports:
            - name: amqp
              containerPort: 5672
            - name: management
              containerPort: 15672
          readinessProbe:
            tcpSocket:
              port: 5672
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 5672
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
          startupProbe:
            tcpSocket:
              port: 5672
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24
            timeoutSeconds: 5
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
