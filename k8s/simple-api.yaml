apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-api
  namespace: labs
spec:
  selector:
    matchLabels:
      app: simple-api
  template:
    metadata:
      labels:
        app: simple-api
    spec:
      containers:
        - name: simple-api
          image: leoff00/simple-api:latest
          imagePullPolicy: Always
          resources:
            limits:
              memory: "128Mi"
              cpu: "500m"
            requests:
              memory: "64Mi"
              cpu: "250m"
          ports:
            - containerPort: 8081
          readinessProbe:
            httpGet:
              port: 8081
              path: /
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              port: 8081
              path: /livez
            initialDelaySeconds: 10
            periodSeconds: 15
          startupProbe:
            httpGet:
              port: 8081
              path: /readyz
            initialDelaySeconds: 5
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "echo stopping... && sleep 5"]
---
apiVersion: v1
kind: Service
metadata:
  name: simple-api-svc
  namespace: labs
spec:
  selector:
    app: simple-api
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
  type: ClusterIP
