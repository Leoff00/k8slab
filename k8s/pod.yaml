apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-lab
  namespace: labs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-lab
  template:
    metadata:
      labels:
        app: nginx-lab
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: init-check
          image: busybox:1.36
          command: ["sh", "-c", "echo init ok && sleep 2"]
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "echo stopping... && sleep 5"]
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-lab-svc
  namespace: labs
spec:
  selector:
    app: nginx-lab
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
  type: "NodePort"
